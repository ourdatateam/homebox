name: Build & publish image

on:
  push:
    branches: [dev, prod]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  GHCR_REPO: ghcr.io/ourdatateam/homebox

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          UPSTREAM_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          BUILD_ID="ourdata.$(date -u +%Y%m%d).${{ github.run_number }}"
          echo "version=${UPSTREAM_VERSION}+${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Determine env tag
        id: env
        run: |
          case "${GITHUB_REF##*/}" in
            dev)  echo "tag=dev"  >> "$GITHUB_OUTPUT" ;;
            prod) echo "tag=prod" >> "$GITHUB_OUTPUT" ;;
            *)    echo "Refusing to build from non-dev/prod branch"; exit 1 ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REPO }}:${{ steps.env.outputs.tag }}
            ${{ env.GHCR_REPO }}:${{ steps.env.outputs.tag }}-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          build-args: |
            COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
